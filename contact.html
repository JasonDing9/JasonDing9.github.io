	<script>
		(function () {
			try {
				var t = localStorage.getItem('theme');
				if (t !== 'light' && t !== 'dark') {
					t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				}
				document.documentElement.setAttribute('data-theme', t);
			} catch (e) {}
		})();
	</script>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
	<header id="site-nav"></header>

	<main>
		<section class="page-header">
			<div class="container">
				<p class="eyebrow">Let's get in touch</p>
				<h1>Contact</h1>
			</div>
		</section>

		<section class="container section-tight reveal">
			<div class="prose" style="margin-bottom: 1.5rem;">

			</div>

			<div class="contact-grid">

					<div>
						<div class="contact-label">GitHub</div>
						<div class="contact-value">@JasonDing9</div>
					</div>
				</a>
				<a class="contact-card" href="https://www.linkedin.com/in/jasonding9/" target="_blank" rel="noopener">
					<span class="contact-icon"><i class="fab fa-linkedin" aria-hidden="true"></i></span>
					<div>
						<div class="contact-label">LinkedIn</div>
						<div class="contact-value">jasonding9</div>
					</div>
				</a>
				<div class="contact-card" style="cursor:default;">
					<span class="contact-icon"><i class="fab fa-discord" aria-hidden="true"></i></span>
					<div>
						<div class="contact-label">Discord</div>
